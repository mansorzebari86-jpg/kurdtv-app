
<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurd TV VIP</title>
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- HLS.js for Web Browser Playback Fallback -->
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    
    <style>
        :root {
            --bg-dark: #0a0a0a;
            --nav-bg: #111111;
            --blue-text: #4da6ff;
            --gray-text: #777777;
            --yellow: #ffd700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        body {
            background-color: var(--bg-dark);
            color: #fff;
            padding-bottom: 85px;
            overflow-x: hidden;
        }

        /* 🟢 کلاسێ تایبەت بۆ شەفافکرنا باکگراوندێ デمێ TV Mode کار دکەت داکو ExoPlayer دیار ببیت */
        body.tv-active {
            background-color: transparent !important;
        }
        body.tv-active .page, body.tv-active .bottom-nav, body.tv-active .header-container {
            display: none !important;
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeInPage 0.2s ease-out; }
        @keyframes fadeInPage { 
            from { opacity: 0; transform: translateY(5px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        .header-container { 
            padding: 15px; position: sticky; top: 0; 
            background: rgba(10, 10, 10, 0.98); 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); 
        }

        .search-box { 
            background: #1a1a1a; border-radius: 25px; padding: 10px 20px; 
            display: flex; align-items: center; border: 1px solid #333; transition: all 0.2s ease; 
        }
        .search-box:focus-within { border-color: var(--blue-text); background: #222; }
        .search-box input { background: transparent; border: none; color: #fff; outline: none; width: 100%; text-align: right; font-size: 14px; }
        .search-box i { color: #888; margin-left: 10px; }
        .search-box:focus-within i { color: var(--blue-text); }

        .banner-container { padding: 0 15px 15px; }
        .main-banner { 
            background: linear-gradient(135deg, #162a33 0%, #0a0a0a 100%); 
            border: 1px solid rgba(255, 215, 0, 0.2); 
            border-radius: 20px; padding: 20px; text-align: center; position: relative; overflow: hidden; 
        }
        .main-banner h2 { color: var(--yellow); font-size: 24px; margin-bottom: 5px; font-weight: bold; }
        .main-banner p { font-size: 13px; color: #ddd; font-weight: 500;}

        .section-wrapper { padding: 10px 15px; margin-bottom: 5px; }
        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .section-title { font-size: 17px; font-weight: bold; display: flex; align-items: center; gap: 8px; }
        .see-more { 
            background: #1c2b3a; color: var(--blue-text); padding: 6px 16px; border-radius: 15px; 
            font-size: 12px; display: flex; align-items: center; gap: 5px; cursor: pointer; border: none; font-weight: bold;
        }

        .channel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        
        .channel-card { text-align: center; text-decoration: none; cursor: pointer; border-radius: 18px; outline: none; transition: all 0.15s ease; }
        .channel-card:focus { transform: scale(1.1); box-shadow: 0 0 15px var(--yellow); }
        .channel-card:focus .logo-container { border-color: var(--yellow) !important; }
        .channel-card:active { transform: scale(0.95); }

        .logo-container { 
            background: linear-gradient(145deg, #1c1c1e, #0e0e11); border-radius: 18px; aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center; position: relative; padding: 8px; border: 1px solid rgba(255,255,255,0.08); 
        }
        .logo-container img { width: 90%; height: 90%; object-fit: contain; }
        
        .channel-name { display: block; font-size: 11px; color: #ddd; margin-top: 8px; font-weight: bold; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }

        .badge { position: absolute; top: -6px; right: -6px; padding: 3px 6px; border-radius: 8px; font-size: 8px; font-weight: bold; color: #fff; text-transform: uppercase; z-index: 2; }
        .badge.news { background: linear-gradient(135deg, #0072ff, #00c6ff); }
        .badge.sports { background: linear-gradient(135deg, #f12711, #f5af19); }
        .badge.movies { background: linear-gradient(135deg, #8A2387, #E94057); }
        .badge.music { background: linear-gradient(135deg, #654ea3, #eaafc8); }

        .category-scroll { display: flex; overflow-x: auto; padding: 10px 15px; gap: 10px; scrollbar-width: none; }
        .category-scroll::-webkit-scrollbar { display: none; }
        
        .chip { 
            background: #1a1a1a; color: #fff; padding: 8px 18px; border-radius: 20px; 
            white-space: nowrap; font-size: 14px; display: flex; align-items: center; gap: 8px; border: 1px solid #333; cursor: pointer; outline: none;
        }
        .chip:focus { border-color: var(--blue-text); box-shadow: 0 0 10px var(--blue-text); }
        .chip.active { background: #1c2b3a; color: var(--blue-text); border-color: var(--blue-text); font-weight: bold;}

        .page-title { padding: 10px 15px; font-size: 20px; font-weight: bold; }

        .bottom-nav { 
            position: fixed; bottom: 0; width: 100%; background-color: rgba(17, 17, 17, 0.99); 
            display: flex; justify-content: space-around; padding: 12px 0 18px; border-top: 1px solid rgba(255,255,255,0.05); z-index: 1000; 
        }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--gray-text); font-size: 11px; font-weight: bold; cursor: pointer; position: relative; outline: none; padding: 5px; border-radius: 10px; }
        .nav-item:focus { color: var(--blue-text); background: rgba(255,255,255,0.05); }
        .nav-item i { font-size: 22px; margin-bottom: 4px; }
        .nav-item.active { color: var(--blue-text); }
        .nav-item.active::before { content: ''; position: absolute; top: -12px; left: 50%; transform: translateX(-50%); width: 35px; height: 3px; background: var(--blue-text); border-radius: 0 0 5px 5px; }

        .settings-container { padding: 15px; }
        .settings-card { background: linear-gradient(145deg, #1a1a24, #0d0d12); border: 1px solid rgba(255,255,255,0.08); border-radius: 20px; padding: 25px 20px; text-align: center; margin-bottom: 15px; }
        .settings-avatar { width: 80px; height: 80px; background: linear-gradient(45deg, var(--yellow), #ff9800); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 35px; color: #111; margin: 0 auto 12px auto; border: 3px solid #222; }

        /* 🟢 TV MODE STYLES (Maten TV Style Overlay) */
        #tvModePage {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background: transparent; z-index: 10000; display: none; overflow: hidden;
        }
        
        .tv-video-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; align-items: center; justify-content: center; background: #000; z-index: 1;
        }
        .tv-video-container video { width: 100%; height: 100%; object-fit: contain; }

        .tv-ui-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; transition: opacity 0.5s ease; z-index: 2;
        }

        .tv-exit-btn {
            position: absolute; top: 20px; left: 20px;
            background: rgba(239, 68, 68, 0.9); color: #fff; width: 50px; height: 50px;
            border-radius: 50%; font-size: 22px; cursor: pointer; display: flex;
            align-items: center; justify-content: center; border: 2px solid transparent; outline: none;
            pointer-events: auto; transition: all 0.2s;
        }
        .tv-exit-btn:focus, .tv-exit-btn:hover { border-color: #fff; box-shadow: 0 0 20px #ef4444; transform: scale(1.1); }

        .tv-right-sidebar {
            position: absolute; top: 0; right: 0; width: 320px; height: 100%;
            background: linear-gradient(to left, rgba(0,0,0,0.95) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);
            display: flex; flex-direction: column; padding: 20px 20px 20px 0; pointer-events: auto;
        }

        .tv-categories {
            display: flex; gap: 10px; overflow-x: auto; padding-bottom: 15px; margin-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); scrollbar-width: none;
        }
        .tv-categories::-webkit-scrollbar { display: none; }
        
        .tv-cat-btn {
            background: rgba(255,255,255,0.1); color: #fff; padding: 8px 15px; border-radius: 12px; font-size: 14px; font-weight: bold; border: 2px solid transparent; cursor: pointer; outline: none; white-space: nowrap; transition: all 0.2s;
        }
        .tv-cat-btn:focus, .tv-cat-btn:hover { border-color: var(--blue-text); background: rgba(77, 166, 255, 0.2); }
        .tv-cat-btn.active { background: var(--blue-text); color: #000; border-color: var(--blue-text); }

        .tv-channel-list { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; scrollbar-width: none; }
        .tv-channel-list::-webkit-scrollbar { display: none; }

        .tv-channel-item {
            display: flex; align-items: center; gap: 15px; background: rgba(20, 20, 25, 0.8);
            padding: 10px; border-radius: 15px; border: 2px solid transparent; cursor: pointer; outline: none; transition: all 0.2s;
        }
        .tv-channel-item:focus, .tv-channel-item:hover { border-color: var(--yellow); background: rgba(255, 215, 0, 0.15); transform: scale(1.02); }
        .tv-channel-item.playing { border-color: var(--blue-text); background: rgba(77, 166, 255, 0.15); }
        
        .tv-channel-logo { width: 50px; height: 50px; background: #111; border-radius: 10px; padding: 5px; display: flex; align-items: center; justify-content: center; }
        .tv-channel-logo img { width: 100%; height: 100%; object-fit: contain; }
        .tv-channel-info { flex: 1; text-align: right; }
        .tv-channel-title { font-size: 14px; font-weight: bold; color: #fff; }
        .tv-channel-badge { font-size: 10px; color: #aaa; margin-top: 3px; }

        .tv-loader {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 60px; height: 60px; border: 5px solid rgba(255, 215, 0, 0.2);
            border-top-color: var(--yellow); border-radius: 50%; animation: tvSpin 1s linear infinite; display: none; z-index: 10000;
        }
        @keyframes tvSpin { 100% { transform: translate(-50%, -50%) rotate(360deg); } }
    </style>
</head>
<body>

    <div id="homePage" class="page active">
        <div class="header-container"><div class="search-box"><input type="text" id="homeSearch" oninput="appSearch(this.value)" placeholder="گەڕیان بۆ کەناڵ..."><i class="fa-solid fa-magnifying-glass"></i></div></div>
        <div class="banner-container"><div class="main-banner"><h2>KURD TV VIP</h2><p>باشترین بەرنامە بۆ پەخشی ڕاستەوخۆ</p></div></div>
        <div class="section-wrapper" id="home-news"><div class="section-header"><div class="section-title"><i class="fa-solid fa-newspaper text-blue-400"></i> هەواڵەکان</div><div class="see-more" onclick="goToCategory('news')">زیاتر ببینە <i class="fa-solid fa-chevron-left"></i></div></div><div class="channel-grid" id="grid-news"></div></div>
        <div class="section-wrapper" id="home-sports"><div class="section-header"><div class="section-title"><i class="fa-solid fa-soccer-ball text-orange-400"></i> وەرزش</div><div class="see-more" onclick="goToCategory('sports')">زیاتر ببینە <i class="fa-solid fa-chevron-left"></i></div></div><div class="channel-grid" id="grid-sports"></div></div>
        <div class="section-wrapper" id="home-movies"><div class="section-header"><div class="section-title"><i class="fa-solid fa-film" style="color: #e91e63;"></i> فیلم</div><div class="see-more" onclick="goToCategory('movies')">زیاتر ببینە <i class="fa-solid fa-chevron-left"></i></div></div><div class="channel-grid" id="grid-movies"></div></div>
        <div class="section-wrapper" id="home-music"><div class="section-header"><div class="section-title"><i class="fa-solid fa-music" style="color: #9c27b0;"></i> مۆسیقا و قورئان</div><div class="see-more" onclick="goToCategory('music')">زیاتر ببینە <i class="fa-solid fa-chevron-left"></i></div></div><div class="channel-grid" id="grid-music"></div></div>
    </div>

    <div id="channelsPage" class="page">
        <div class="header-container"><div class="search-box"><input type="text" id="channelSearchInput" oninput="appSearch(this.value)" placeholder="گەڕیان بۆ کەناڵ..."><i class="fa-solid fa-magnifying-glass"></i></div></div>
        <div class="page-title">هەموو کەناڵەکان</div>
        <div class="category-scroll">
            <div id="chip-all" class="chip active" tabindex="0" onclick="filterCategory('all', this)">هەموو</div>
            <div id="chip-news" class="chip" tabindex="0" onclick="filterCategory('news', this)"><i class="fa-solid fa-newspaper"></i> هەواڵ</div>
            <div id="chip-sports" class="chip" tabindex="0" onclick="filterCategory('sports', this)"><i class="fa-solid fa-soccer-ball"></i> وەرزش</div>
            <div id="chip-movies" class="chip" tabindex="0" onclick="filterCategory('movies', this)"><i class="fa-solid fa-film"></i> فیلم</div>
            <div id="chip-music" class="chip" tabindex="0" onclick="filterCategory('music', this)"><i class="fa-solid fa-music"></i> مۆسیقا</div>
        </div>
        <div id="channelContent" style="padding: 10px 15px;"><div class="channel-grid" id="grid-all-page"></div></div>
    </div>

    <div id="settingsPage" class="page">
        <div class="header-container"><div class="page-title text-center font-bold">ڕێکخستن</div></div>
        <div class="settings-container"><div class="settings-card"><div class="settings-avatar"><i class="fa-solid fa-crown text-yellow-400"></i></div><h3 class="settings-name">دەربارەی من</h3><p class="settings-bio">بەخێربێی بۆ باشترین بەرنامەی پەخشی ڕاستەوخۆ.</p></div></div>
    </div>

    <div class="bottom-nav" id="bottomNavigation">
        <div id="nav-home" class="nav-item active" tabindex="0" onclick="switchMainTab('homePage', this)"><i class="fa-solid fa-house"></i><span>سەرەکی</span></div>
        <div id="nav-channels" class="nav-item" tabindex="0" onclick="switchMainTab('channelsPage', this)"><i class="fa-solid fa-tv"></i><span>کەناڵان</span></div>
        <div class="nav-item" tabindex="0" onclick="openTvMode()"><i class="fa-solid fa-desktop"></i><span>TV Mode</span></div>
        <div class="nav-item" tabindex="0" onclick="switchMainTab('settingsPage', this)"><i class="fa-solid fa-gear"></i><span>ڕێکخستن</span></div>
    </div>

    <!-- 🟢 TV MODE OVERLAY (Maten TV Style Overlay) -->
    <div id="tvModePage">
        <!-- ڤیدیۆ پلەیەرێ یەدەگ بۆ وێب (ئەگەر ئەپ نەبوو) -->
        <div class="tv-video-container" id="tvVideoContainer">
            <video id="tvVideoPlayer" playsinline></video>
            <div id="tvLoader" class="tv-loader"></div>
        </div>

        <!-- لایەرێ شەفاف یێ UI کو دکەڤیتە سەر ExoPlayer -->
        <div class="tv-ui-overlay" id="tvUiOverlay">
            <button class="tv-exit-btn" tabindex="0" onclick="closeTvMode()"><i class="fa-solid fa-power-off"></i></button>

            <div class="tv-right-sidebar">
                <div class="tv-categories">
                    <button class="tv-cat-btn active" tabindex="0" onclick="loadTvCategory('news', this)">هەواڵ</button>
                    <button class="tv-cat-btn" tabindex="0" onclick="loadTvCategory('sports', this)">وەرزش</button>
                    <button class="tv-cat-btn" tabindex="0" onclick="loadTvCategory('movies', this)">فیلم</button>
                    <button class="tv-cat-btn" tabindex="0" onclick="loadTvCategory('music', this)">مۆسیقا</button>
                </div>
                <div class="tv-channel-list" id="tvChannelList"></div>
            </div>
        </div>
    </div>

    <script>
        const database = [
            { name: "Channel 8", type: "news", logo: "https://i.ibb.co/B55XSx5q/CHANNEL8-Iraq.webp", stream: "https://live.channel8.com/Channel8-Kurdish/index.fmp4.m3u8" },
            { name: "NRT HD", type: "news", logo: "https://i.ibb.co/B5NNc1HP/images-2.jpg", stream: "https://hlspackager.akamaized.net/live/DB/NRT_HD/HLS/NRT_HD-avc1_2500000=10002,mp4a_128000=20000.m3u8" },
            { name: "RUDAW HD", type: "news", logo: "https://i.ibb.co/V0tMym0G/images.jpg", stream: "https://live.rudaw.net/hls/rudaw-tv/master.m3u8" },
            { name: "Kurdistan 24", type: "news", logo: "https://kimi-web-img.moonshot.cn/img/static.wikia.nocookie.net/72745400a987c0f677d7611bc0c07355be418007", stream: "https://d1x82nydcxndze.cloudfront.net/live/index.m3u8" },
            { name: "Bein Sport", type: "sports", logo: "https://i.ibb.co/ycFrxJ3N/miswag-o-UHT2-K.jpg", stream: "http://103.205.17.194:8080/live/mohammamohammad/112233445566/228976.m3u8" },
            { name: "Duhok Sport", type: "sports", logo: "https://i.ibb.co/ZRXgLbMf/duhok-tv-sport-528x297.jpg", stream: "http://krdtvappfree.ddns.net/Duhoksport/tracks-v1a1/mono.m3u8" },
            { name: "AVA Sport", type: "sports", logo: "https://i.ibb.co/35NfXDZk/download.jpg", stream: "http://darpro4k.com:8080/live/Paulus.somay/lxpuT0SOkd13GR/402166.m3u8" },
            { name: "Avar TV", type: "movies", logo: "https://i.ibb.co/b51Lmw7Q/images-17.jpg", stream: "https://avr.host247.net/live/AvarTv/playlist.m3u8" },
            { name: "Bask HD", type: "movies", logo: "https://i.ibb.co/x8c8mnVR/images-27.jpg", stream: "http://baskhd.ddns.net:40/live/baskhd/playlist.m3u8" },
            { name: "Mix Kurdish", type: "music", logo: "https://i.ibb.co/mr9SgBKJ/images-8.jpg", stream: "http://avrstream.com:1935/live/Mix-kurdy/playlist.m3u8" },
            { name: "Zarok TV", type: "music", logo: "https://i.ibb.co/pvrGnx34/images-24.jpg", stream: "https://zindisorani.zaroktv.com.tr/hls/stream.m3u8" }
        ];

        document.addEventListener("DOMContentLoaded", () => {
            renderDashboard();
            renderAllChannelsPage();
            setupTvInteraction();
        });

        function createCard(item) {
            return `
                <div class="channel-card search-target" tabindex="0" data-name="${item.name.toLowerCase()}" data-type="${item.type}" onclick="triggerStream('${item.stream}', '${item.name}')">
                    <div class="logo-container"><span class="badge ${item.type}">${item.type}</span><img src="${item.logo}" alt="${item.name}" loading="lazy"></div>
                    <span class="channel-name">${item.name}</span>
                </div>`;
        }

        function renderDashboard() {
            const sectors = { news: '', sports: '', movies: '', music: '' };
            database.forEach(item => { if(sectors[item.type] !== undefined) sectors[item.type] += createCard(item); });
            Object.keys(sectors).forEach(key => { document.getElementById(`grid-${key}`).innerHTML = sectors[key]; });
        }

        function renderAllChannelsPage() {
            let content = ''; database.forEach(item => { content += createCard(item); });
            document.getElementById('grid-all-page').innerHTML = content;
        }

        function switchMainTab(pageId, navButton) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
            navButton.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function triggerStream(streamUrl, channelName) {
            if (window.AndroidBridge && window.AndroidBridge.playInExo) {
                window.AndroidBridge.playInExo(streamUrl, channelName);
            } else {
                alert("پەخشکەری ئەندرۆید نەدۆزرایەوە!");
            }
        }

        // ==========================================
        // 🟢 TV MODE LOGIC (ExoPlayer + HTML Overlay)
        // ==========================================
        let tvHlsInstance = null;
        const tvVideo = document.getElementById('tvVideoPlayer');
        const tvLoader = document.getElementById('tvLoader');
        let tvUiTimeout;

        function openTvMode() {
            document.body.classList.add('tv-active'); // شەفافکرنا باکگراوندێ بۆ دەرخستنا ExoPlayer
            document.getElementById('tvModePage').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            loadTvCategory('news', document.querySelector('.tv-cat-btn'));
            showTvUi();
        }

        function closeTvMode() {
            document.body.classList.remove('tv-active'); // زڤڕاندنا باکگراوندێ بۆ ڕەشێ ئاسایی
            document.getElementById('tvModePage').style.display = 'none';
            document.body.style.overflow = 'auto';
            
            if (window.AndroidBridge && window.AndroidBridge.exitTvMode) {
                window.AndroidBridge.exitTvMode(); // داخستنا ExoPlayer و زڤڕاندنا باری ڕاست (Portrait)
            } else {
                if (tvHlsInstance) { tvHlsInstance.destroy(); tvHlsInstance = null; }
                tvVideo.pause(); tvVideo.removeAttribute('src'); tvVideo.load();
                if (document.exitFullscreen) document.exitFullscreen().catch(()=>{});
            }
        }

        function loadTvCategory(category, btnElement) {
            if(btnElement) {
                document.querySelectorAll('.tv-cat-btn').forEach(b => b.classList.remove('active'));
                btnElement.classList.add('active');
            }

            const listContainer = document.getElementById('tvChannelList');
            let content = '';
            
            const filtered = database.filter(item => item.type === category);
            filtered.forEach((item) => {
                content += `
                    <div class="tv-channel-item" tabindex="0" onclick="playTvChannel('${item.stream}', this)">
                        <div class="tv-channel-logo"><img src="${item.logo}" alt="${item.name}"></div>
                        <div class="tv-channel-info"><div class="tv-channel-title">${item.name}</div><div class="tv-channel-badge">${category}</div></div>
                    </div>`;
            });
            listContainer.innerHTML = content;
            
            const firstChannel = listContainer.querySelector('.tv-channel-item');
            if(firstChannel) {
                firstChannel.focus();
                playTvChannel(filtered[0].stream, firstChannel);
            }
        }

        function playTvChannel(url, element) {
            showTvUi(); 
            document.querySelectorAll('.tv-channel-item').forEach(el => el.classList.remove('playing'));
            element.classList.add('playing');

            // 🟢 بەکارهێنانی ExoPlayer ی نەیتیڤ یێ ئەندرۆید د ناڤ TV Mode دا
            if (window.AndroidBridge && window.AndroidBridge.playTvExo) {
                document.getElementById('tvVideoContainer').style.display = 'none'; // ڤەشارتنا پەخشکەری وێب
                window.AndroidBridge.playTvExo(url); // پێکرنا ExoPlayer د باکگراوندێ دا
            } else {
                // یەدەگ بۆ وێبگەڕێ ئاسایی (ئەگەر ل سەر ئەپی نەبوو)
                document.getElementById('tvVideoContainer').style.display = 'flex';
                tvLoader.style.display = 'block';
                if (tvHlsInstance) { tvHlsInstance.destroy(); tvHlsInstance = null; }
                tvVideo.pause(); tvVideo.removeAttribute('src'); tvVideo.load();

                if (Hls.isSupported()) {
                    tvHlsInstance = new Hls({ lowLatencyMode: true });
                    tvHlsInstance.loadSource(url);
                    tvHlsInstance.attachMedia(tvVideo);
                    tvHlsInstance.on(Hls.Events.MANIFEST_PARSED, () => { tvVideo.play().then(() => tvLoader.style.display = 'none').catch(()=>{}); });
                } else if (tvVideo.canPlayType('application/vnd.apple.mpegurl')) {
                    tvVideo.src = url;
                    tvVideo.play().then(() => tvLoader.style.display = 'none').catch(()=>{});
                }
            }
        }

        // ==========================================
        // 🟢 TV UI AUTO-HIDE & REMOTE CONTROL
        // ==========================================
        function showTvUi() {
            const ui = document.getElementById('tvUiOverlay');
            ui.style.opacity = '1';
            clearTimeout(tvUiTimeout);
            tvUiTimeout = setTimeout(() => { ui.style.opacity = '0'; }, 5000);
        }

        function setupTvInteraction() {
            document.getElementById('tvModePage').addEventListener('mousemove', showTvUi);
            document.getElementById('tvModePage').addEventListener('touchstart', showTvUi);
            
            document.addEventListener('keydown', function(e) {
                const isTvModeActive = document.getElementById('tvModePage').style.display === 'block';
                if(isTvModeActive) {
                    showTvUi(); 
                    if(e.key === 'Enter') { if(document.activeElement && document.activeElement.hasAttribute('tabindex')) { document.activeElement.click(); } }
                    if(e.key === 'Escape' || e.key === 'Backspace') { closeTvMode(); }
                }
            });
        }
    </script>
</body>
</html>
