name: Build Kurd TV VIP APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android Premium UI Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/kurdtv/vip
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable
        
        # دروستکردنا کۆدێ وێنەیێ ڤێکتۆر یێ دوکما داخستنێ یا پاك
        cat << 'EOF' > app/src/main/res/drawable/ic_close.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="24dp"
            android:height="24dp"
            android:viewportWidth="24"
            android:viewportHeight="24">
            <path
                android:fillColor="#FFFFFFFF"
                android:pathData="M19,6.41L17.59,5 12,10.59 6.41,5 5,6.41 10.59,12 5,17.59 6.41,19 12,13.41 17.59,19 19,17.59 13.41,12z"/>
        </vector>
        EOF

        # دروستکردنا کۆدێ وێنەیێ ڤێکتۆر یێ دوکما تەمام شاشەکردنێ (Fullscreen Arrows)
        cat << 'EOF' > app/src/main/res/drawable/ic_fullscreen.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android"
            android:width="24dp"
            android:height="24dp"
            android:viewportWidth="24"
            android:viewportHeight="24">
            <path
                android:fillColor="#FFFFFFFF"
                android:pathData="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z"/>
        </vector>
        EOF
        
        # دانانا فایلا HTML
        cp index.html app/src/main/assets/index.html || echo "<html><body><h1>Kurd TV VIP</h1></body></html>" > app/src/main/assets/index.html
        
        # کۆنتڕۆلکرنا لۆگۆیێ فەرمی یێ بەرنامەی
        if [ -f "logo.png" ]; then
            cp logo.png app/src/main/res/drawable/ic_launcher.png
            echo "Custom logo.png successfully set as App Icon!"
        elif [ -f "logo.jpg" ]; then
            cp logo.jpg app/src/main/res/drawable/ic_launcher.png
            echo "Custom logo.jpg successfully set as App Icon!"
        elif [ -f "logo.webp" ]; then
            cp logo.webp app/src/main/res/drawable/ic_launcher.png
            echo "Custom logo.webp successfully set as App Icon!"
        else
            curl -L -o app/src/main/res/drawable/ic_launcher.png "https://upload.wikimedia.org/wikipedia/commons/c/cf/ExoPlayer_logo.png"
            echo "No custom logo found in root, using standard ExoPlayer PNG fallback icon."
        fi
        
        # ڕێکخستنا سەرەکی یا ئەندرۆیدێ
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.kurdtv.vip'
            compileSdk 34
            defaultConfig {
                applicationId "com.kurdtv.vip"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
        }
        EOF
        
        # دیزاینێ نوو: ExoPlayer ل سەرێ شاشێ و WebView ل بنی (ب لادانا ب تەمامی یا لایەرێ خەلەتییا ٨ چرکە یا ناوخۆیی)
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:orientation="vertical"
            android:background="#0A0E17">

            <FrameLayout
                android:id="@+id/player_container"
                android:layout_width="match_parent"
                android:layout_height="240dp"
                android:visibility="gone">

                <!-- پلەیەر ب کۆنتڕۆلا کەتوار بۆ کارکرنا دوکمان -->
                <com.google.android.exoplayer2.ui.StyledPlayerView
                    android:id="@+id/main_player_view"
                    android:layout_width="match_parent"
                    android:layout_height="match_parent"
                    android:background="#000000"
                    app:surface_type="texture_view"
                    app:resize_mode="fit"
                    app:use_controller="true"
                    app:show_timeout="3000"
                    app:controller_layout_id="@layout/custom_exo_controls"/>

                <!-- چەرخا لۆدکرنا نەیف (Buffering Spinner) -->
                <ProgressBar
                    android:id="@+id/native_loading_spinner"
                    android:layout_width="55dp"
                    android:layout_height="55dp"
                    android:layout_gravity="center"
                    android:indeterminateTint="#4da6ff"
                    android:visibility="gone" />
            </FrameLayout>

            <WebView
                android:id="@+id/main_web_view"
                android:layout_width="match_parent"
                android:layout_height="0dp"
                android:layout_weight="1"
                android:background="#0A0E17"/>
        </LinearLayout>
        EOF

        # دروستکردنا کۆنتڕۆلێن نەیف یێن پاقژ ب وێنەیێن ڤێکتۆر یێن نوو یێن ic_close و ic_fullscreen
        cat << 'EOF' > app/src/main/res/layout/custom_exo_controls.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#30000000">

            <!-- دوکما سۆر یا داخستنێ (Power Icon) ل سەرێ ڕاستێ دگەڵ وێنەیێ ic_close -->
            <ImageButton
                android:id="@+id/custom_close_btn"
                android:layout_width="45dp"
                android:layout_height="45dp"
                android:layout_alignParentTop="true"
                android:layout_alignParentEnd="true"
                android:layout_marginTop="12dp"
                android:layout_marginEnd="12dp"
                android:background="@android:color/transparent"
                android:src="@drawable/ic_close"
                android:tint="#EF4444"
                android:contentDescription="Close" />

            <!-- دوکما لەندسکێپێ ل خوارێ سمتێ چەپێ دگەڵ وێنەیێ ic_fullscreen -->
            <ImageButton
                android:id="@+id/exo_fullscreen"
                android:layout_width="45dp"
                android:layout_height="45dp"
                android:layout_alignParentBottom="true"
                android:layout_alignParentStart="true"
                android:layout_marginStart="12dp"
                android:layout_marginBottom="12dp"
                android:background="@android:color/transparent"
                android:src="@drawable/ic_fullscreen"
                android:tint="#FFFFFF"
                android:contentDescription="Fullscreen" />

            <!-- نیشاندەرا Live یا نەیف -->
            <TextView
                android:id="@+id/live_indicator_text"
                android:layout_width="wrap_content"
                android:layout_height="wrap_content"
                android:layout_alignParentBottom="true"
                android:layout_alignParentEnd="true"
                android:layout_marginEnd="12dp"
                android:layout_marginBottom="18dp"
                android:text="LIVE 🔴"
                android:textColor="#EF4444"
                android:textStyle="bold"
                android:textSize="11sp" />
        </RelativeLayout>
        EOF
        
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            
            <uses-feature android:name="android.software.leanback" android:required="false" />
            <uses-feature android:name="android.hardware.touchscreen" android:required="false" />

            <application
                android:allowBackup="true"
                android:label="Kurd TV VIP"
                android:icon="@drawable/ic_launcher"
                android:roundIcon="@drawable/ic_launcher"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                android:usesCleartextTraffic="true"
                android:hardwareAccelerated="true">
                <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden|layoutDirection">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                        <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat << 'EOF' > app/src/main/java/com/kurdtv/vip/MainActivity.java
        package com.kurdtv.vip;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.content.pm.ActivityInfo;
        import android.graphics.Color;
        import android.net.Uri;
        import android.os.Bundle;
        import android.os.Handler; // 🟢 چارەسەریا فەرمی یا هاندلەرێ زڤڕاندنا خۆکار
        import android.view.View;
        import android.view.ViewGroup;
        import android.view.WindowManager;
        import android.webkit.JavascriptInterface;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.webkit.WebResourceRequest;
        import android.widget.FrameLayout; 
        import android.widget.LinearLayout; 
        import android.widget.ProgressBar;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;
        import com.google.android.exoplayer2.DefaultLoadControl;
        import com.google.android.exoplayer2.ExoPlayer;
        import com.google.android.exoplayer2.MediaItem;
        import com.google.android.exoplayer2.Player;
        import com.google.android.exoplayer2.PlaybackException;
        import com.google.android.exoplayer2.ui.StyledPlayerView;

        public class MainActivity extends AppCompatActivity {
            private WebView wv;
            private ExoPlayer player;
            private StyledPlayerView playerView;
            private FrameLayout playerContainer; 
            private ProgressBar loadingSpinner;
            private boolean isFullscreen = false;

            // 🟢 مەکینەیا زڤڕاندنا خۆکار (Auto-Retry Runner) ب بێ داخستن
            private int retryCount = 0;
            private final int MAX_RETRIES = 10;
            private final Handler retryHandler = new Handler();
            private final Runnable retryRunnable = new Runnable() {
                @Override
                public void run() {
                    if (player != null) {
                        player.prepare();
                        player.play();
                    }
                }
            };

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                playerView = findViewById(R.id.main_player_view);
                playerContainer = findViewById(R.id.player_container);
                wv = findViewById(R.id.main_web_view);
                loadingSpinner = findViewById(R.id.native_loading_spinner);

                wv.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                wv.setBackgroundColor(Color.TRANSPARENT);

                wv.setFocusable(true);
                wv.setFocusableInTouchMode(true);
                wv.requestFocus();

                playerContainer.setVisibility(View.GONE);

                DefaultLoadControl loadControl = new DefaultLoadControl.Builder()
                        .setBufferDurationsMs(1000, 4000, 800, 1000)
                        .build();

                player = new ExoPlayer.Builder(this)
                        .setLoadControl(loadControl)
                        .build();
                playerView.setPlayer(player);

                player.setPlayWhenReady(true); 

                View closeBtn = playerView.findViewById(R.id.custom_close_btn);
                if (closeBtn != null) {
                    closeBtn.setOnClickListener(new View.OnClickListener() {
                        @Override
                        public void onClick(View v) {
                            stopAndHidePlayer();
                        }
                    });
                }

                playerView.setFullscreenButtonClickListener(new StyledPlayerView.FullscreenButtonClickListener() {
                    @Override
                    public void onFullscreenButtonClick(boolean isFullScreen) {
                        toggleFullscreen(isFullScreen);
                    }
                });

                player.addListener(new Player.Listener() {
                    @Override
                    public void onPlaybackStateChanged(int state) {
                        if (state == Player.STATE_BUFFERING) {
                            if (loadingSpinner != null) {
                                loadingSpinner.setVisibility(View.VISIBLE);
                            }
                        } else if (state == Player.STATE_READY) {
                            if (loadingSpinner != null) {
                                loadingSpinner.setVisibility(View.GONE);
                            }
                            retryCount = 0; // زڤڕاندنا دەورێ ب تەمامی سفر دبیتەوە دەمێ کار دکەت
                            retryHandler.removeCallbacks(retryRunnable);
                        } else if (state == Player.STATE_ENDED) {
                            if (loadingSpinner != null) {
                                loadingSpinner.setVisibility(View.GONE);
                            }
                        }
                    }

                    @Override
                    public void onPlayerError(PlaybackException error) {
                        if (loadingSpinner != null) {
                            loadingSpinner.setVisibility(View.VISIBLE);
                        }
                        // 🟢 سیستمێ زڤڕاندنا خۆکار هەر ٣ چرکە جاران ب بێ ڕاوەستاندنا تەمام یا ئەپی
                        if (retryCount < MAX_RETRIES) {
                            retryCount++;
                            retryHandler.removeCallbacks(retryRunnable);
                            retryHandler.postDelayed(retryRunnable, 3000);
                        } else {
                            if (loadingSpinner != null) {
                                loadingSpinner.setVisibility(View.GONE);
                            }
                            Toast.makeText(MainActivity.this, "ئاریشە د پەخشی دا هەیە!", Toast.LENGTH_SHORT).show();
                        }
                    }
                });

                WebSettings ws = wv.getSettings();
                ws.setJavaScriptEnabled(true);
                ws.setDomStorageEnabled(true);
                ws.setAllowFileAccess(true);
                
                ws.setUseWideViewPort(true);
                ws.setLoadWithOverviewMode(true);
                ws.setSupportZoom(false);
                ws.setBuiltInZoomControls(false);
                ws.setDisplayZoomControls(false);
                
                ws.setCacheMode(WebSettings.LOAD_NO_CACHE);
                wv.clearCache(true);
                
                ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                
                wv.addJavascriptInterface(new Object() {
                    @JavascriptInterface
                    public void playInExo(final String url, final String name) {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                if (url != null && !url.isEmpty()) {
                                    retryCount = 0; // پاککرنەوەی دەستپێکی
                                    retryHandler.removeCallbacks(retryRunnable);
                                    
                                    if (playerContainer != null) {
                                        playerContainer.setVisibility(View.VISIBLE);
                                    }
                                    playerView.setVisibility(View.VISIBLE);
                                    if (loadingSpinner != null) {
                                        loadingSpinner.setVisibility(View.VISIBLE);
                                    }

                                    MediaItem mediaItem = MediaItem.fromUri(Uri.parse(url));
                                    player.setMediaItem(mediaItem);
                                    player.prepare();
                                    player.play();
                                }
                            }
                        });
                    }

                    @JavascriptInterface
                    public void stopExo() {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                stopAndHidePlayer();
                            }
                        });
                    }
                }, "AndroidBridge");

                wv.setWebViewClient(new WebViewClient() {
                    @Override
                    public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) {
                        String url = request.getUrl().toString();
                        return handleCustomUri(view, url);
                    }

                    @SuppressWarnings("deprecation")
                    @Override
                    public boolean shouldOverrideUrlLoading(WebView view, String url) {
                        return handleCustomUri(view, url);
                    }

                    private boolean handleCustomUri(WebView view, String url) {
                        if (url == null || url.startsWith("http://") || url.startsWith("https://")) {
                            return false; 
                        }
                        try {
                            if (url.startsWith("intent://")) {
                                Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                                if (intent != null) {
                                    view.stopLoading();
                                    PackageManager packageManager = view.getContext().getPackageManager();
                                    if (intent.resolveActivity(packageManager) != null) {
                                        view.getContext().startActivity(intent);
                                        return true;
                                    }
                                    String fallbackUrl = intent.getStringExtra("browser_fallback_url");
                                    if (fallbackUrl != null) {
                                        view.loadUrl(fallbackUrl);
                                        return true;
                                    }
                                }
                            } else {
                                Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url));
                                view.getContext().startActivity(intent);
                                return true;
                            }
                        } catch (Exception e) {
                            Toast.makeText(MainActivity.this, "ئەڤ ئەپڵیکەیشنە ل سەر تەلەفۆنا تە نینە!", Toast.LENGTH_SHORT).show();
                        }
                        return true;
                    }

                    @Override
                    public void onPageFinished(WebView view, String url) {
                        String js = "window.triggerStreamingOverlay = function(url, name) { window.AndroidBridge.playInExo(url, name); };" +
                                    "window.exitStreamOverlay = function() { window.AndroidBridge.stopExo(); };";
                        wv.evaluateJavascript(js, null);
                    }

                    @Override
                    public void onReceivedError(WebView view, int errorCode, String description, String failingUrl) {
                        if (!failingUrl.startsWith("intent://") && !failingUrl.startsWith("tg://")) {
                            Toast.makeText(MainActivity.this, "ئاریشە د گرێدانا ئینتەرنێتێ دا هەیە!", Toast.LENGTH_LONG).show();
                        }
                    }
                });
                
                wv.setWebChromeClient(new WebChromeClient());
                wv.loadUrl("https://mansorzebari86-jpg.github.io/kurdtv-app/");
            }

            private void stopAndHidePlayer() {
                retryHandler.removeCallbacks(retryRunnable);
                if (player != null) {
                    player.stop();
                    player.clearMediaItems();
                }
                if (loadingSpinner != null) {
                    loadingSpinner.setVisibility(View.GONE);
                }
                if (playerContainer != null) {
                    playerContainer.setVisibility(View.GONE);
                }
                playerView.setVisibility(View.GONE);
                if (isFullscreen) {
                    toggleFullscreen(false);
                }
            }

            private void toggleFullscreen(boolean fullscreen) {
                isFullscreen = fullscreen;
                if (fullscreen) {
                    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                    getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                    wv.setVisibility(View.GONE);
                    
                    LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(
                            ViewGroup.LayoutParams.MATCH_PARENT,
                            ViewGroup.LayoutParams.MATCH_PARENT
                    );
                    playerContainer.setLayoutParams(params);
                } else {
                    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                    getWindow().clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                    wv.setVisibility(View.VISIBLE);

                    int heightPx = (int) (240 * getResources().getDisplayMetrics().density);
                    LinearLayout.LayoutParams params = new LinearLayout.LayoutParams(
                            ViewGroup.LayoutParams.MATCH_PARENT,
                            heightPx
                    );
                    playerContainer.setLayoutParams(params);
                }
            }

            @Override
            public void onBackPressed() {
                if (isFullscreen) {
                    toggleFullscreen(false);
                } else if (playerView.getVisibility() == View.VISIBLE) {
                    stopAndHidePlayer();
                } else if (wv.canGoBack()) {
                    wv.goBack();
                } else {
                    super.onBackPressed();
                }
            }

            @Override
            protected void onPause() {
                super.onPause();
                if (player != null) {
                    player.pause();
                }
            }

            @Override
            protected void onDestroy() {
                super.onDestroy();
                retryHandler.removeCallbacks(retryRunnable);
                if (player != null) {
                    player.release();
                    player = null;
                }
            }
        }
        EOF
        
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Premium ExoPlayer APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished ExoPlayer APK
      uses: actions/upload-artifact@v4
      with:
        name: KurdTV-ExoPlayer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
