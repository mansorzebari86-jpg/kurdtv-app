name: Build Kurd TV VIP APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android Premium UI Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/kurdtv/vip
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        mkdir -p app/src/main/res/drawable
        
        cat << 'EOF' > app/src/main/res/drawable/ic_close.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFFFF" android:pathData="M19,6.41L17.59,5 12,10.59 6.41,5 5,6.41 10.59,12 5,17.59 6.41,19 12,13.41 17.59,19 19,17.59 13.41,12z"/>
        </vector>
        EOF

        cat << 'EOF' > app/src/main/res/drawable/ic_fullscreen.xml
        <vector xmlns:android="http://schemas.android.com/apk/res/android" android:width="24dp" android:height="24dp" android:viewportWidth="24" android:viewportHeight="24">
            <path android:fillColor="#FFFFFFFF" android:pathData="M7,14H5v5h5v-2H7V14z M5,10h2V7h3V5H5V10z M17,17h-3v2h5v-5h-2V17z M14,5v2h3v3h2V5H14z"/>
        </vector>
        EOF
        
        cp index.html app/src/main/assets/index.html || echo "<html><body><h1>Kurd TV VIP</h1></body></html>" > app/src/main/assets/index.html
        
        if [ -f "logo.png" ]; then cp logo.png app/src/main/res/drawable/ic_launcher.png
        elif [ -f "logo.jpg" ]; then cp logo.jpg app/src/main/res/drawable/ic_launcher.png
        else curl -L -o app/src/main/res/drawable/ic_launcher.png "https://upload.wikimedia.org/wikipedia/commons/c/cf/ExoPlayer_logo.png"; fi
        
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        # 🟢 App Build: بکارئینانا ڤێرژنا فەرمی و پشتڕاستکری یا 3.6.5 یا VLC دگەل لایبرەریێن پشتەڤان
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.kurdtv.vip'
            compileSdk 34
            defaultConfig {
                applicationId "com.kurdtv.vip"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'androidx.legacy:legacy-support-v4:1.0.0'
            implementation 'org.videolan.android:libvlc-all:3.6.5' // 👈 ڤێرژنا جێگیر و ب هێز یا VLC
        }
        EOF
        
        # 🟢 Layout Update: بکارئینانا لایەرێ VLCVideoLayout بۆ پێکرنا هەمی کەنالێن بێ دەنگ ب دەنگەکێ دروست
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0A0E17">

            <FrameLayout
                android:id="@+id/player_container"
                android:layout_width="match_parent"
                android:layout_height="240dp"
                android:layout_alignParentTop="true"
                android:visibility="gone">

                <!-- 🟢 لایەرێ فەرمی یێ VLC -->
                <org.videolan.libvlc.util.VLCVideoLayout
                    android:id="@+id/main_player_view"
                    android:layout_width="match_parent"
                    android:layout_height="match_parent"
                    android:background="#000000" />

                <!-- چەرخا لۆدکرنێ -->
                <ProgressBar
                    android:id="@+id/native_loading_spinner"
                    android:layout_width="55dp"
                    android:layout_height="55dp"
                    android:layout_gravity="center"
                    android:indeterminateTint="#4da6ff"
                    android:visibility="gone" />

                <!-- لایەرێ دوکما و کۆنتڕۆلێن زیرەک -->
                <RelativeLayout
                    android:id="@+id/custom_controls_overlay"
                    android:layout_width="match_parent"
                    android:layout_height="match_parent"
                    android:background="#15000000">

                    <!-- دوکما سۆر یا داخستنێ -->
                    <ImageButton
                        android:id="@+id/custom_close_btn"
                        android:layout_width="45dp"
                        android:layout_height="45dp"
                        android:layout_alignParentTop="true"
                        android:layout_alignParentEnd="true"
                        android:layout_marginTop="12dp"
                        android:layout_marginEnd="12dp"
                        android:background="@android:color/transparent"
                        android:src="@drawable/ic_close"
                        android:tint="#EF4444"
                        android:contentDescription="Close" />

                    <!-- دوکما تەمام شاشەکرنێ -->
                    <ImageButton
                        android:id="@+id/vlc_fullscreen_btn"
                        android:layout_width="45dp"
                        android:layout_height="45dp"
                        android:layout_alignParentBottom="true"
                        android:layout_alignParentStart="true"
                        android:layout_marginStart="12dp"
                        android:layout_marginBottom="12dp"
                        android:background="@android:color/transparent"
                        android:src="@drawable/ic_fullscreen"
                        android:tint="#FFFFFF"
                        android:contentDescription="Fullscreen" />

                    <!-- نیشاندەرا Live -->
                    <TextView
                        android:layout_width="wrap_content"
                        android:layout_height="wrap_content"
                        android:layout_alignParentBottom="true"
                        android:layout_alignParentEnd="true"
                        android:layout_marginEnd="12dp"
                        android:layout_marginBottom="18dp"
                        android:text="LIVE 🔴"
                        android:textColor="#EF4444"
                        android:textStyle="bold"
                        android:textSize="11sp" />
                </RelativeLayout>
            </FrameLayout>

            <WebView
                android:id="@+id/main_web_view"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:layout_below="@id/player_container"
                android:background="@android:color/transparent"/>
        </RelativeLayout>
        EOF
        
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <uses-feature android:name="android.software.leanback" android:required="false" />
            <uses-feature android:name="android.hardware.touchscreen" android:required="false" />
            <application android:allowBackup="true" android:label="Kurd TV VIP" android:icon="@drawable/ic_launcher" android:roundIcon="@drawable/ic_launcher" android:theme="@style/Theme.AppCompat.Light.NoActionBar" android:usesCleartextTraffic="true" android:hardwareAccelerated="true">
                <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden|layoutDirection">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                        <category android:name="android.intent.category.LEANBACK_LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        # 🟢 MainActivity: داڕشتنا نوو ب بکارئینانا لایبرەرییا LibVLC داکو دەنگێ هەمی کەنالان دروست کار بکەت
        cat << 'EOF' > app/src/main/java/com/kurdtv/vip/MainActivity.java
        package com.kurdtv.vip;
        import android.content.Intent;
        import android.content.pm.PackageManager;
        import android.content.pm.ActivityInfo;
        import android.graphics.Color;
        import android.net.Uri;
        import android.os.Bundle;
        import android.os.Handler;
        import android.view.View;
        import android.view.ViewGroup;
        import android.view.WindowManager;
        import android.webkit.JavascriptInterface;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.webkit.WebResourceRequest;
        import android.widget.FrameLayout; 
        import android.widget.RelativeLayout; 
        import android.widget.ProgressBar;
        import android.widget.ImageButton;
        import android.widget.Toast;
        import androidx.appcompat.app.AppCompatActivity;

        import org.videolan.libvlc.LibVLC;
        import org.videolan.libvlc.Media;
        import org.videolan.libvlc.MediaPlayer;
        import org.videolan.libvlc.util.VLCVideoLayout;

        import java.util.ArrayList;

        public class MainActivity extends AppCompatActivity {
            private WebView wv;
            private LibVLC libVLC;
            private MediaPlayer mediaPlayer;
            private VLCVideoLayout videoLayout;
            private FrameLayout playerContainer; 
            private ProgressBar loadingSpinner;
            private ImageButton closeBtn, fullscreenBtn;
            private boolean isFullscreen = false;
            private boolean isTvMode = false;

            private int retryCount = 0;
            private final int MAX_RETRIES = 10;
            private final Handler retryHandler = new Handler();
            private String lastPlayedUrl = "";
            private final Runnable retryRunnable = new Runnable() {
                @Override 
                public void run() { 
                    if (mediaPlayer != null && lastPlayedUrl != null && !lastPlayedUrl.isEmpty()) { 
                        playUrl(lastPlayedUrl);
                    } 
                }
            };

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                videoLayout = findViewById(R.id.main_player_view);
                playerContainer = findViewById(R.id.player_container);
                wv = findViewById(R.id.main_web_view);
                loadingSpinner = findViewById(R.id.native_loading_spinner);
                closeBtn = findViewById(R.id.custom_close_btn);
                fullscreenBtn = findViewById(R.id.vlc_fullscreen_btn);

                wv.setLayerType(View.LAYER_TYPE_HARDWARE, null);
                wv.setBackgroundColor(Color.TRANSPARENT);
                wv.setFocusable(true);
                wv.setFocusableInTouchMode(true);
                wv.requestFocus();
                playerContainer.setVisibility(View.GONE);

                // دروستکرنا رێکخستنێن VLC
                ArrayList<String> options = new ArrayList<>();
                options.add("--file-caching=2000");
                options.add("--network-caching=2000");
                options.add("--live-caching=1000");
                options.add("--clock-jitter=0");
                options.add("--drop-late-frames");
                options.add("--skip-frames");
                
                libVLC = new LibVLC(this, options);
                mediaPlayer = new MediaPlayer(libVLC);
                mediaPlayer.attachViews(videoLayout, null, false, false);

                closeBtn.setOnClickListener(v -> stopAndHidePlayer());
                fullscreenBtn.setOnClickListener(v -> toggleFullscreen(!isFullscreen));

                mediaPlayer.setEventListener(new MediaPlayer.EventListener() {
                    @Override
                    public void onEvent(MediaPlayer.Event event) {
                        runOnUiThread(() -> {
                            if (event.type == MediaPlayer.Event.Buffering) {
                                float buffering = event.getBuffering();
                                if (buffering < 100) {
                                    if (loadingSpinner != null) loadingSpinner.setVisibility(View.VISIBLE);
                                } else {
                                    if (loadingSpinner != null) loadingSpinner.setVisibility(View.GONE);
                                    retryCount = 0;
                                    retryHandler.removeCallbacks(retryRunnable);
                                }
                            } else if (event.type == MediaPlayer.Event.Playing) {
                                if (loadingSpinner != null) loadingSpinner.setVisibility(View.GONE);
                                retryCount = 0;
                                retryHandler.removeCallbacks(retryRunnable);
                            } else if (event.type == MediaPlayer.Event.EncounteredError) {
                                if (loadingSpinner != null) loadingSpinner.setVisibility(View.VISIBLE);
                                if (retryCount < MAX_RETRIES) {
                                    retryCount++;
                                    retryHandler.removeCallbacks(retryRunnable);
                                    retryHandler.postDelayed(retryRunnable, 3000);
                                } else {
                                    if (loadingSpinner != null) loadingSpinner.setVisibility(View.GONE);
                                    Toast.makeText(MainActivity.this, "ئاریشە د پەخشی دا هەیە!", Toast.LENGTH_SHORT).show();
                                }
                            }
                        });
                    }
                });

                WebSettings ws = wv.getSettings();
                ws.setJavaScriptEnabled(true); ws.setDomStorageEnabled(true); ws.setAllowFileAccess(true);
                ws.setUseWideViewPort(true); ws.setLoadWithOverviewMode(true); ws.setSupportZoom(false);
                ws.setBuiltInZoomControls(false); ws.setDisplayZoomControls(false); ws.setCacheMode(WebSettings.LOAD_NO_CACHE);
                ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                
                wv.addJavascriptInterface(new Object() {
                    
                    @JavascriptInterface
                    public void playInExo(final String url, final String name) {
                        runOnUiThread(() -> {
                            if (url != null && !url.isEmpty()) {
                                isTvMode = false;
                                
                                if (!isFullscreen) {
                                    int heightPx = (int) (240 * getResources().getDisplayMetrics().density);
                                    RelativeLayout.LayoutParams params = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, heightPx);
                                    params.addRule(RelativeLayout.ALIGN_PARENT_TOP);
                                    playerContainer.setLayoutParams(params);
                                    
                                    RelativeLayout.LayoutParams webParams = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                                    webParams.addRule(RelativeLayout.BELOW, R.id.player_container);
                                    wv.setLayoutParams(webParams);
                                }
                                
                                retryCount = 0; retryHandler.removeCallbacks(retryRunnable);
                                if (playerContainer != null) playerContainer.setVisibility(View.VISIBLE);
                                videoLayout.setVisibility(View.VISIBLE);
                                if (loadingSpinner != null) loadingSpinner.setVisibility(View.VISIBLE);
                                
                                playUrl(url);
                            }
                        });
                    }

                    @JavascriptInterface
                    public void stopExo() { runOnUiThread(() -> stopAndHidePlayer()); }

                    @JavascriptInterface
                    public void playTvExo(final String url) {
                        runOnUiThread(() -> {
                            isTvMode = true;
                            setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                            getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);

                            RelativeLayout.LayoutParams playerParams = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                            playerContainer.setLayoutParams(playerParams);
                            playerContainer.setVisibility(View.VISIBLE);
                            videoLayout.setVisibility(View.VISIBLE);

                            RelativeLayout.LayoutParams webParams = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                            webParams.removeRule(RelativeLayout.BELOW);
                            wv.setLayoutParams(webParams);
                            wv.bringToFront();
                            wv.setBackgroundColor(Color.TRANSPARENT);

                            if (url != null && !url.isEmpty()) {
                                retryCount = 0; retryHandler.removeCallbacks(retryRunnable);
                                if (loadingSpinner != null) loadingSpinner.setVisibility(View.VISIBLE);
                                playUrl(url);
                            }
                        });
                    }

                    @JavascriptInterface
                    public void exitTvMode() {
                        runOnUiThread(() -> { stopAndHidePlayer(); });
                    }

                }, "AndroidBridge");

                wv.setWebViewClient(new WebViewClient() {
                    @Override public boolean shouldOverrideUrlLoading(WebView view, WebResourceRequest request) { return handleCustomUri(view, request.getUrl().toString()); }
                    @SuppressWarnings("deprecation") @Override public boolean shouldOverrideUrlLoading(WebView view, String url) { return handleCustomUri(view, url); }
                    private boolean handleCustomUri(WebView view, String url) {
                        if (url == null || url.startsWith("http://") || url.startsWith("https://")) return false; 
                        try {
                            if (url.startsWith("intent://")) {
                                Intent intent = Intent.parseUri(url, Intent.URI_INTENT_SCHEME);
                                if (intent != null) { view.stopLoading(); PackageManager pm = view.getContext().getPackageManager(); if (intent.resolveActivity(pm) != null) { view.getContext().startActivity(intent); return true; } }
                            } else { Intent intent = new Intent(Intent.ACTION_VIEW, Uri.parse(url)); view.getContext().startActivity(intent); return true; }
                        } catch (Exception e) {}
                        return true;
                    }
                });
                
                wv.setWebChromeClient(new WebChromeClient());
                wv.loadUrl("file:///android_asset/index.html");
            }

            private void playUrl(String url) {
                lastPlayedUrl = url;
                try {
                    Media media = new Media(libVLC, Uri.parse(url));
                    media.addOption(":network-caching=2000");
                    media.addOption(":live-caching=1000");
                    mediaPlayer.setMedia(media);
                    media.release();
                    mediaPlayer.play();
                } catch (Exception e) {
                    e.printStackTrace();
                }
            }

            private void stopAndHidePlayer() {
                retryHandler.removeCallbacks(retryRunnable);
                if (mediaPlayer != null) { 
                    mediaPlayer.stop(); 
                }
                if (loadingSpinner != null) loadingSpinner.setVisibility(View.GONE);
                if (playerContainer != null) playerContainer.setVisibility(View.GONE);
                videoLayout.setVisibility(View.GONE);

                RelativeLayout.LayoutParams webParams = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                webParams.addRule(RelativeLayout.BELOW, R.id.player_container);
                wv.setLayoutParams(webParams);
                wv.setVisibility(View.VISIBLE);

                if (isFullscreen || isTvMode) {
                    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                    getWindow().clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                    
                    int heightPx = (int) (240 * getResources().getDisplayMetrics().density);
                    RelativeLayout.LayoutParams params = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, heightPx);
                    params.addRule(RelativeLayout.ALIGN_PARENT_TOP);
                    playerContainer.setLayoutParams(params);
                    
                    isFullscreen = false;
                }
                isTvMode = false;
            }

            private void toggleFullscreen(boolean fullscreen) {
                if (isTvMode) return; 
                isFullscreen = fullscreen;
                if (fullscreen) {
                    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                    getWindow().addFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                    wv.setVisibility(View.GONE);
                    
                    RelativeLayout.LayoutParams params = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, ViewGroup.LayoutParams.MATCH_PARENT);
                    playerContainer.setLayoutParams(params);
                } else {
                    setRequestedOrientation(ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                    getWindow().clearFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN);
                    wv.setVisibility(View.VISIBLE);
                    
                    int heightPx = (int) (240 * getResources().getDisplayMetrics().density);
                    RelativeLayout.LayoutParams params = new RelativeLayout.LayoutParams(ViewGroup.LayoutParams.MATCH_PARENT, heightPx);
                    params.addRule(RelativeLayout.ALIGN_PARENT_TOP);
                    playerContainer.setLayoutParams(params);
                }
            }

            @Override public void onBackPressed() {
                if (isFullscreen || isTvMode) { stopAndHidePlayer(); wv.evaluateJavascript("if(typeof closeTvMode === 'function') closeTvMode();", null); }
                else if (videoLayout.getVisibility() == View.VISIBLE) stopAndHidePlayer();
                else if (wv.canGoBack()) wv.goBack();
                else super.onBackPressed();
            }

            @Override protected void onDestroy() {
                super.onDestroy(); retryHandler.removeCallbacks(retryRunnable);
                if (mediaPlayer != null) { mediaPlayer.release(); mediaPlayer = null; }
                if (libVLC != null) { libVLC.release(); libVLC = null; }
            }
        }
        EOF
        
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Premium VLC APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished VLC APK
      uses: actions/upload-artifact@v4
      with:
        name: KurdTV-VLC-APK
        path: app/build/outputs/apk/debug/app-debug.apk
