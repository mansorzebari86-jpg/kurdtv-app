name: Build Kurd TV VIP APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android Premium UI Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/kurdtv/vip
        mkdir -p app/src/main/res/values
        mkdir -p app/src/main/res/layout
        
        # گۆھۆڕینا فایلا پێشان گەهاندنێ
        cp index.html app/src/main/assets/index.html || echo "<html><body><h1>Kurd TV VIP</h1></body></html>" > app/src/main/assets/index.html
        
        # فایلێن ڕێکخستنا ئەندرۆیدێ
        echo "android.useAndroidX=true" > gradle.properties
        echo "android.enableJetifier=true" >> gradle.properties
        echo "include ':app'" > settings.gradle
        
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.kurdtv.vip'
            compileSdk 34
            defaultConfig {
                applicationId "com.kurdtv.vip"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0.0"
            }
            compileOptions {
                sourceCompatibility JavaVersion.VERSION_17
                targetCompatibility JavaVersion.VERSION_17
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
        }
        EOF
        
        # دیزاینێ نوو: یەکگرتنا WebView ل سەر ExoPlayer ب شێوەیەکێ زێڕین و شەفاف
        cat << 'EOF' > app/src/main/res/layout/activity_main.xml
        <?xml version="1.0" encoding="utf-8"?>
        <RelativeLayout xmlns:android="http://schemas.android.com/apk/res/android"
            xmlns:app="http://schemas.android.com/apk/res-auto"
            android:layout_width="match_parent"
            android:layout_height="match_parent"
            android:background="#0A0E17">

            <!-- پلیەرێ ExoPlayer ل ژێر لایەرێ WebView (بێ کۆنترۆلێن کەتوار) -->
            <com.google.android.exoplayer2.ui.StyledPlayerView
                android:id="@+id/main_player_view"
                android:layout_width="match_parent"
                android:layout_height="250dp"
                android:layout_alignParentTop="true"
                android:background="#000000"
                android:visibility="gone"
                app:surface_type="texture_view"
                app:use_controller="false"/>

            <!-- لایەرێ سەرەکی یێ WebView (هەموو شاشێ دگریت و یێ شەفافە) -->
            <WebView
                android:id="@+id/main_web_view"
                android:layout_width="match_parent"
                android:layout_height="match_parent"
                android:background="@android:color/transparent"/>
        </RelativeLayout>
        EOF
        
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <application
                android:allowBackup="true"
                android:label="Kurd TV VIP"
                android:theme="@style/Theme.AppCompat.Light.NoActionBar"
                android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
            </application>
        </manifest>
        EOF
        
        cat << 'EOF' > app/src/main/java/com/kurdtv/vip/MainActivity.java
        package com.kurdtv.vip;
        import android.graphics.Color;
        import android.net.Uri;
        import android.os.Bundle;
        import android.view.View;
        import android.webkit.JavascriptInterface;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import android.widget.RelativeLayout;
        import androidx.appcompat.app.AppCompatActivity;
        import com.google.android.exoplayer2.ExoPlayer;
        import com.google.android.exoplayer2.MediaItem;
        import com.google.android.exoplayer2.Player;
        import com.google.android.exoplayer2.ui.StyledPlayerView;

        public class MainActivity extends AppCompatActivity {
            private WebView wv;
            private ExoPlayer player;
            private StyledPlayerView playerView;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                setContentView(R.layout.activity_main);

                playerView = findViewById(R.id.main_player_view);
                wv = findViewById(R.id.main_web_view);

                // دروستکرنا شەفافیەتێ داکو ڤیدیۆیا پشت شاشێ دەرکەڤیت
                wv.setBackgroundColor(Color.TRANSPARENT);

                // ئامادەکرنا ExoPlayer
                player = new ExoPlayer.Builder(this).build();
                playerView.setPlayer(player);
                playerView.setUseController(false); // گرتنا کۆنترۆلێن کەتوار

                WebSettings ws = wv.getSettings();
                ws.setJavaScriptEnabled(true);
                ws.setDomStorageEnabled(true);
                ws.setAllowFileAccess(true);
                ws.setMixedContentMode(WebSettings.MIXED_CONTENT_ALWAYS_ALLOW);
                
                wv.addJavascriptInterface(new Object() {
                    @JavascriptInterface
                    public void playInExo(final String url, final String name) {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                if (url != null && !url.isEmpty()) {
                                    playerView.setVisibility(View.VISIBLE);
                                    MediaItem mediaItem = MediaItem.fromUri(Uri.parse(url));
                                    player.setMediaItem(mediaItem);
                                    player.prepare();
                                    player.play();
                                }
                            }
                        });
                    }

                    @JavascriptInterface
                    public void stopExo() {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                if (player != null) {
                                    player.stop();
                                    player.clearMediaItems();
                                }
                                playerView.setVisibility(View.GONE);
                                setRequestedOrientation(android.content.pm.ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                            }
                        });
                    }

                    @JavascriptInterface
                    public void toggleLandscape(final boolean landscape) {
                        runOnUiThread(new Runnable() {
                            @Override
                            public void run() {
                                if (landscape) {
                                    setRequestedOrientation(android.content.pm.ActivityInfo.SCREEN_ORIENTATION_SENSOR_LANDSCAPE);
                                } else {
                                    setRequestedOrientation(android.content.pm.ActivityInfo.SCREEN_ORIENTATION_PORTRAIT);
                                }
                            }
                        });
                    }
                }, "AndroidBridge");

                // گرێدانا کاردانەوەیێن پەخشی دگەڵ کۆنترۆلێن HTML
                player.addListener(new Player.Listener() {
                    @Override
                    public void onPlaybackStateChanged(int playbackState) {
                        if (playbackState == Player.STATE_BUFFERING) {
                            wv.post(new Runnable() {
                                @Override
                                public void run() {
                                    wv.evaluateJavascript("document.getElementById('loadingSpinner').style.display = 'block';", null);
                                }
                            });
                        } else {
                            wv.post(new Runnable() {
                                @Override
                                public void run() {
                                    wv.evaluateJavascript("document.getElementById('loadingSpinner').style.display = 'none';", null);
                                }
                            });
                        }
                    }

                    @Override
                    public void onPlayerError(com.google.android.exoplayer2.PlaybackException error) {
                        wv.post(new Runnable() {
                            @Override
                            public void run() {
                                wv.evaluateJavascript("document.getElementById('loadingSpinner').style.display = 'none'; document.getElementById('errorModule').style.display = 'flex';", null);
                            }
                        });
                    }
                });

                wv.setWebViewClient(new WebViewClient());
                wv.setWebChromeClient(new WebChromeClient());
                wv.loadUrl("file:///android_asset/index.html");
            }

            private void updatePlayerLayout(boolean isLandscape) {
                RelativeLayout.LayoutParams params = (RelativeLayout.LayoutParams) playerView.getLayoutParams();
                if (isLandscape) {
                    params.width = RelativeLayout.LayoutParams.MATCH_PARENT;
                    params.height = RelativeLayout.LayoutParams.MATCH_PARENT;
                } else {
                    params.width = RelativeLayout.LayoutParams.MATCH_PARENT;
                    params.height = (int) (250 * getResources().getDisplayMetrics().density);
                }
                playerView.setLayoutParams(params);
            }

            @Override
            public void onConfigurationChanged(android.content.res.Configuration newConfig) {
                super.onConfigurationChanged(newConfig);
                if (newConfig.orientation == android.content.res.Configuration.ORIENTATION_LANDSCAPE) {
                    updatePlayerLayout(true);
                } else if (newConfig.orientation == android.content.res.Configuration.ORIENTATION_PORTRAIT) {
                    updatePlayerLayout(false);
                }
            }

            @Override
            protected void onPause() {
                super.onPause();
                if (player != null) {
                    player.pause();
                }
            }

            @Override
            protected void onDestroy() {
                super.onDestroy();
                if (player != null) {
                    player.release();
                    player = null;
                }
            }
        }
        EOF
        
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Premium ExoPlayer APK
      run: ./gradlew assembleDebug --stacktrace

    - name: Upload Finished ExoPlayer APK
      uses: actions/upload-artifact@v4
      with:
        name: KurdTV-ExoPlayer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
