name: Build Kurd TV VIP APK (ExoPlayer Engine)

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'

    - name: Setup Android AndroidX & ExoPlayer Project
      run: |
        mkdir -p app/src/main/assets
        mkdir -p app/src/main/java/com/kurdtv/vip
        
        # گواستنا فایلی بۆ ناڤ فۆڵدەرێ ئەسێتس
        mv index.html app/src/main/assets/index.html
        
        # دروستکرنا فایلێ settings.gradle
        echo "include ':app'" > settings.gradle
        
        # دروستکرنا فایلێ build.gradle یێ سەرەکی
        cat << 'EOF' > build.gradle
        buildscript {
            repositories { google(); mavenCentral() }
            dependencies { classpath 'com.android.tools.build:gradle:8.2.2' }
        }
        allprojects { repositories { google(); mavenCentral() } }
        EOF
        
        # دروستکرنا فایلێ app/build.gradle دگەل زێدەکرنا پەرتووکخانا ExoPlayer
        cat << 'EOF' > app/build.gradle
        plugins { id 'com.android.application' }
        android {
            namespace 'com.kurdtv.vip'
            compileSdk 34
            defaultConfig {
                applicationId "com.kurdtv.vip"
                minSdk 21
                targetSdk 34
                versionCode 1
                versionName "1.0.0-ExoPlayer"
            }
        }
        dependencies {
            implementation 'androidx.appcompat:appcompat:1.6.1'
            implementation 'com.google.android.material:material:1.11.0'
            // لۆدکرنا مەکینەیا فەرمی یا ExoPlayer بۆ لێدەرێ HLS و کەنالان
            implementation 'com.google.android.exoplayer:exoplayer:2.19.1'
        }
        EOF
        
        # دروستکرنا فایلێ AndroidManifest
        cat << 'EOF' > app/src/main/AndroidManifest.xml
        <?xml version="1.0" encoding="utf-8"?>
        <manifest xmlns:android="http://schemas.android.com/apk/res/android">
            <uses-permission android:name="android.permission.INTERNET" />
            <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />
            <application
                android:allowBackup="true"
                android:label="Kurd TV VIP"
                android:theme="@style/Theme.AppCompat.NoActionBar"
                android:usesCleartextTraffic="true">
                <activity android:name=".MainActivity" android:exported="true" android:configChanges="orientation|screenSize|keyboardHidden">
                    <intent-filter>
                        <action android:name="android.intent.action.MAIN" />
                        <category android:name="android.intent.category.LAUNCHER" />
                    </intent-filter>
                </activity>
                <activity android:name=".ExoPlayerActivity" android:exported="false" android:configChanges="orientation|screenSize|layoutDirection" android:screenOrientation="landscape" />
            </application>
        </manifest>
        EOF
        
        # دروستکرنا فایلێ سەرەکی یێ وێبێ دگەل پەیوەندییا پردێ (Bridge) بۆ ExoPlayer
        cat << 'EOF' > app/src/main/java/com/kurdtv/vip/MainActivity.java
        package com.kurdtv.vip;
        import android.app.Activity;
        import android.content.Intent;
        import android.os.Bundle;
        import android.webkit.JavascriptInterface;
        import android.webkit.WebChromeClient;
        import android.webkit.WebSettings;
        import android.webkit.WebView;
        import android.webkit.WebViewClient;
        import androidx.appcompat.app.AppCompatActivity;

        public class MainActivity extends AppCompatActivity {
            private WebView wv;
            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                wv = new WebView(this);
                setContentView(wv);
                WebSettings ws = wv.getSettings();
                ws.setJavaScriptEnabled(true);
                ws.setDomStorageEnabled(true);
                ws.setAllowFileAccess(true);
                
                // دروستکرنا پردەکێ د ناڤبەرا وێب و کۆدێ ئەندرۆید یێ ExoPlayer دا
                wv.addJavascriptInterface(new Object() {
                    @JavascriptInterface
                    public void playInExo(String url, String name) {
                        Intent intent = new Intent(MainActivity.this, ExoPlayerActivity.class);
                        intent.putExtra("STREAM_URL", url);
                        intent.putExtra("STREAM_NAME", name);
                        startActivity(intent);
                    }
                }, "AndroidBridge");

                wv.setWebViewClient(new WebViewClient() {
                    @Override
                    public void onPageFinished(WebView view, String url) {
                        // گۆڕینی لێدەرێ کۆن د ناڤ HTML دا بۆ مەکینەیا ExoPlayer د مۆبایلێ دا
                        String js = "window.triggerStreamingOverlay = function(url, name) { window.AndroidBridge.playInExo(url, name); };";
                        wv.evaluateJavascript(js, null);
                    }
                });
                wv.setWebChromeClient(new WebChromeClient());
                wv.loadUrl("file:///android_asset/index.html");
            }
        }
        EOF

        # دروستکرنا لاپەرەکێ جودا و پرۆفێشناڵ یێ لێدەرێ فەرمی یێ ExoPlayer
        cat << 'EOF' > app/src/main/java/com/kurdtv/vip/ExoPlayerActivity.java
        package com.kurdtv.vip;
        import android.net.Uri;
        import android.os.Bundle;
        import android.view.View;
        import android.view.WindowManager;
        import androidx.appcompat.app.AppCompatActivity;
        import com.google.android.exoplayer2.ExoPlayer;
        import com.google.android.exoplayer2.MediaItem;
        import com.google.android.exoplayer2.ui.StyledPlayerView;

        public class ExoPlayerActivity extends AppCompatActivity {
            private ExoPlayer player;
            private StyledPlayerView playerView;

            @Override
            protected void onCreate(Bundle savedInstanceState) {
                super.onCreate(savedInstanceState);
                
                // شاشا تەمام و بێ ناڤ و نیشان بۆ لێدەرێ ڤیدیۆیێ
                getWindow().setFlags(WindowManager.LayoutParams.FLAG_FULLSCREEN, WindowManager.LayoutParams.FLAG_FULLSCREEN);
                getWindow().addFlags(WindowManager.LayoutParams.FLAG_KEEP_SCREEN_ON);
                
                playerView = new StyledPlayerView(this);
                setContentView(playerView);

                String streamUrl = getIntent().getStringExtra("STREAM_URL");

                player = new ExoPlayer.Builder(this).build();
                playerView.setPlayer(player);

                MediaItem mediaItem = MediaItem.fromUri(Uri.parse(streamUrl));
                player.setMediaItem(mediaItem);
                player.prepare();
                player.play();
            }

            @Override
            protected void onDestroy() {
                super.onDestroy();
                if (player != null) {
                    player.release();
                    player = null;
                }
            }
        }
        EOF
        
        # ڕێکخستنا کارێ Gradle
        gradle wrapper --gradle-version 8.5
        chmod +x gradlew

    - name: Build Premium ExoPlayer APK
      run: ./gradlew assembleDebug

    - name: Upload Finished ExoPlayer APK
      uses: actions/upload-artifact@v4
      with:
        name: KurdTV-ExoPlayer-APK
        path: app/build/outputs/apk/debug/app-debug.apk
